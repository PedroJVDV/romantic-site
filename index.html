<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Só para você ❤️</title>
  <style>
    :root {
      --bg1: #1a0008;
      --bg2: #2a0010;
      --bg3: #3a0015;
      --red-main: #ff3c3c;
      --red-soft: #ff6161;
      --card: rgba(60, 0, 20, 0.55);
      --card-border: rgba(255, 45, 45, 0.65);
      --text-main: #ff4a4a;
      --text-sub: #ff7a7a;
      --text-soft: #ffdede;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 20% 20%, #450018 0%, transparent 35%),
        radial-gradient(circle at 80% 80%, #3a0012 0%, transparent 35%),
        linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3));
      color: var(--text-main);
    }

    body {
      display: flex;
      justify-content: center;
      padding: 28px 16px 24px;
      position: relative;
    }

    .wrapper {
      width: 100%;
      max-width: 1220px;
      position: relative;
      z-index: 2;
    }

    .header {
      display: flex;
      align-items: center;
      border-bottom: 1px solid rgba(255, 50, 50, 0.3);
      padding-bottom: 18px;
      margin-bottom: 48px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: clamp(24px, 3vw, 40px);
      font-weight: 800;
      color: var(--red-main);
      letter-spacing: 0.5px;
      /* brilho mais fraco */
      text-shadow: 0 0 4px rgba(255, 45, 45, 0.35);
    }

    .brand .emoji {
      font-size: 1.05em;
      animation: pulseHeart 1.8s infinite ease-in-out;
      filter: drop-shadow(0 0 4px rgba(255, 70, 70, 0.4));
    }

    @keyframes pulseHeart {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    .hero {
      text-align: center;
      margin-bottom: 34px;
    }

    .hero h1 {
      font-size: clamp(36px, 7vw, 82px);
      line-height: 1.08;
      font-weight: 900;
      color: var(--red-main);
      /* brilho mais fraco */
      text-shadow: 0 0 6px rgba(255, 45, 45, 0.35);
      margin-bottom: 18px;
    }

    .hero p {
      font-size: clamp(16px, 2.1vw, 27px);
      color: var(--text-sub);
      font-style: italic;
      max-width: 980px;
      margin: 0 auto;
      text-shadow: 0 0 4px rgba(255, 40, 40, 0.18);
    }

    .controls {
      display: flex;
      justify-content: center;
      margin-top: 38px;
      margin-bottom: 28px;
    }

    .btn-main {
      border: none;
      cursor: pointer;
      padding: 18px 44px;
      border-radius: 999px;
      font-weight: 800;
      letter-spacing: 0.9px;
      font-size: clamp(17px, 2vw, 24px);
      color: #fff;
      background: linear-gradient(135deg, #cf002e, #ff2d2d);
      box-shadow:
        0 0 10px rgba(255, 45, 45, 0.45),
        0 10px 24px rgba(0, 0, 0, 0.45);
      transition: transform .18s ease, box-shadow .25s ease, filter .2s;
      text-transform: uppercase;
    }

    .btn-main:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow:
        0 0 14px rgba(255, 50, 50, 0.55),
        0 12px 28px rgba(0, 0, 0, 0.55);
    }

    .btn-main:active { transform: scale(0.985); }

    .screen-wrap {
      display: flex;
      justify-content: center;
    }

    .message-screen {
      width: min(100%, 980px);
      min-height: 180px;
      border-radius: 22px;
      padding: 24px 24px;
      background: linear-gradient(145deg, rgba(70,0,20,0.62), rgba(40,0,14,0.62));
      border: 2px solid var(--card-border);
      box-shadow:
        inset 0 0 20px rgba(255, 35, 35, 0.08),
        0 12px 32px rgba(0, 0, 0, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(7px);
    }

    .screen-message {
      font-size: clamp(21px, 3vw, 34px);
      text-align: center;
      line-height: 1.5;
      font-weight: 700;
      color: var(--red-main);
      /* brilho mais fraco */
      text-shadow: 0 0 4px rgba(255, 45, 45, 0.24);
      padding: 4px 8px;
      animation: msgIn .35s ease;
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px) scale(.985); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .footer {
      margin-top: 44px;
      border-top: 1px solid rgba(255, 45, 45, 0.22);
      padding-top: 18px;
      text-align: center;
      color: var(--red-soft);
      font-size: clamp(14px, 1.7vw, 18px);
      text-shadow: 0 0 3px rgba(255, 40, 40, 0.18);
      opacity: 0.9;
    }

    /* popup de poesias */
    .poetry-popup {
      position: fixed;
      right: 20px;
      top: 100px;
      width: min(320px, 86vw);
      min-height: 170px;
      background: rgba(28, 0, 10, 0.92);
      border: 1px solid rgba(255, 70, 70, 0.55);
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.45);
      padding: 14px 14px 12px;
      z-index: 5;
      backdrop-filter: blur(8px);
    }

    .poetry-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      border-bottom: 1px solid rgba(255, 70, 70, 0.22);
      padding-bottom: 6px;
      color: var(--text-soft);
      font-size: 13px;
      letter-spacing: .5px;
    }

    .poetry-title {
      font-weight: 700;
      color: var(--red-soft);
      text-shadow: 0 0 3px rgba(255, 70, 70, 0.15);
    }

    .poetry-body {
      color: #ffd3d3;
      font-size: 14.3px;
      line-height: 1.55;
      min-height: 92px;
      display: flex;
      align-items: center;
      white-space: pre-line;
    }

    .poetry-author {
      margin-top: 8px;
      text-align: right;
      color: #ff9a9a;
      font-size: 12.5px;
      opacity: .92;
    }

    .hearts-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .heart {
      position: absolute;
      top: -10vh;
      font-size: 30px;
      animation: fall linear forwards;
      filter: drop-shadow(0 0 6px rgba(255, 55, 55, 0.45));
      opacity: 0.94;
    }

    @keyframes fall {
      to {
        transform: translateY(115vh) rotate(360deg);
        opacity: 0;
      }
    }

    @media (max-width: 850px) {
      .poetry-popup {
        position: static;
        margin: 18px auto 0;
      }
    }

    @media (max-width: 700px) {
      .header { margin-bottom: 30px; }
      .message-screen { min-height: 150px; padding: 20px 15px; }
      .footer { margin-top: 30px; }
    }
  </style>
</head>
<body>
  <div class="hearts-layer" id="heartsLayer"></div>

  <!-- popup separado em outro canto -->
  <aside class="poetry-popup" id="poetryPopup">
    <div class="poetry-head">
      <span class="poetry-title">poesia romântica</span>
      <span>atualiza em 1 min</span>
    </div>
    <div class="poetry-body" id="poetryText"></div>
    <div class="poetry-author" id="poetryAuthor"></div>
  </aside>

  <div class="wrapper">
    <header class="header">
      <div class="brand">
        <span class="emoji">💕</span>
        <span>só para você ❤️</span>
      </div>
    </header>

    <section class="hero">
      <h1>cada clique é algo diferente...</h1>
      <p>você é muito mais do que pensa, e transmite muito mais do que acha, definitivamente uma mulherzinha incrível :) ui ui ui</p>

      <div class="controls">
        <button id="btnClique" class="btn-main">Clique-me</button>
      </div>

      <div class="screen-wrap">
        <div class="message-screen" aria-live="polite">
          <!-- título removido -->
          <div class="screen-message" id="screenMessage">você ilumina o ambiente sem perceber</div>
        </div>
      </div>
    </section>

    <footer class="footer">algo simples mas belo</footer>
  </div>

  <script>
    // mensagens estilo solicitado (sem emoji)
    const messages = [
      "você é muito mais do que pensa",
      "você transmite muito mais do que acha",
      "definitivamente uma mulherzinha incrível",
      "seu jeito é leve, bonito e raro",
      "tem uma força doce em você",
      "você tem presença, mesmo em silêncio",
      "você marca os detalhes sem forçar nada",
      "você tem um encanto próprio",
      "você tem uma beleza que não é comum",
      "há algo em você que acalma",
      "seu olhar diz mais do que mil frases",
      "você é simples e ao mesmo tempo inesquecível"
    ];

    // poesias curtas / trechos inspirados em românticos relevantes (paráfrases)
    const poetry = [
      { text: "Amar é encontrar no outro a melhor parte de si e cuidar dela com delicadeza.", author: "inspiração em Vinicius de Moraes" },
      { text: "O amor transforma o cotidiano em algo extraordinário, mesmo nos dias mais comuns.", author: "inspiração em Pablo Neruda" },
      { text: "Quem ama de verdade aprende a enxergar beleza onde antes havia pressa.", author: "inspiração em Florbela Espanca" },
      { text: "No amor, o essencial não é dizer muito, mas permanecer inteiro.", author: "inspiração em Clarice Lispector" },
      { text: "A ternura é a linguagem mais alta de duas pessoas que se escolhem.", author: "inspiração em Cecília Meireles" },
      { text: "O coração reconhece aquilo que a razão demora para entender.", author: "inspiração em Fernando Pessoa" }
    ];

    let messageIndex = 0;
    let poetryIndex = 0;

    const screenMessage = document.getElementById("screenMessage");
    const btnClique = document.getElementById("btnClique");
    const heartsLayer = document.getElementById("heartsLayer");

    const poetryText = document.getElementById("poetryText");
    const poetryAuthor = document.getElementById("poetryAuthor");

    function nextMessage() {
      messageIndex = (messageIndex + 1) % messages.length;
      screenMessage.style.animation = "none";
      void screenMessage.offsetWidth;
      screenMessage.textContent = messages[messageIndex];
      screenMessage.style.animation = "msgIn .35s ease";
    }

    function nextPoetry() {
      poetryIndex = (poetryIndex + 1) % poetry.length;
      poetryText.textContent = poetry[poetryIndex].text;
      poetryAuthor.textContent = poetry[poetryIndex].author;
    }

    function rainHearts(count = 56) {
      const hearts = ["❤", "♥", "♡"];
      for (let i = 0; i < count; i++) {
        setTimeout(() => {
          const h = document.createElement("span");
          h.className = "heart";
          h.textContent = hearts[Math.floor(Math.random() * hearts.length)];
          h.style.left = Math.random() * 100 + "vw";
          h.style.fontSize = (18 + Math.random() * 24) + "px";
          h.style.animationDuration = (2.5 + Math.random() * 2.3) + "s";
          heartsLayer.appendChild(h);
          setTimeout(() => h.remove(), 5400);
        }, i * 35);
      }
    }

    btnClique.addEventListener("click", () => {
      nextMessage();
      rainHearts(60);
      if (navigator.vibrate) navigator.vibrate([15, 25, 15]);
    });

    // troca automática da "telinha"
    setInterval(nextMessage, 4200);

    // popup com poesia: 1 em 1 minuto
    setInterval(nextPoetry, 60000);

    // inicial
    poetryText.textContent = poetry[0].text;
    poetryAuthor.textContent = poetry[0].author;
  </script>
</body>
</html>
