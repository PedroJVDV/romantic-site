<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Só para você ❤️</title>
  <style>
    :root {
      --bg1: #1a0008;
      --bg2: #2a0010;
      --bg3: #3a0015;
      --red-glow: #ff2b2b;
      --red-bright: #ff3d3d;
      --red-soft: #ff6a6a;
      --card: rgba(60, 0, 20, 0.55);
      --card-border: rgba(255, 45, 45, 0.75);
      --text-main: #ff3d3d;
      --text-sub: #ff6f6f;
      --white-soft: #ffdede;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
      background: radial-gradient(circle at 20% 20%, #450018 0%, transparent 35%),
                  radial-gradient(circle at 80% 80%, #3a0012 0%, transparent 35%),
                  linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3));
      color: var(--text-main);
    }

    body {
      display: flex;
      justify-content: center;
      padding: 28px 16px 24px;
      position: relative;
    }

    .wrapper {
      width: 100%;
      max-width: 1220px;
      position: relative;
      z-index: 2;
    }

    /* HEADER */
    .header {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      border-bottom: 1px solid rgba(255, 50, 50, 0.35);
      padding-bottom: 18px;
      margin-bottom: 48px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: clamp(24px, 3vw, 40px);
      font-weight: 800;
      letter-spacing: 0.5px;
      color: var(--red-bright);
      text-shadow: 0 0 10px rgba(255, 40, 40, 0.65),
                   0 0 22px rgba(255, 20, 20, 0.35);
    }

    .brand .emoji {
      font-size: 1.05em;
      filter: drop-shadow(0 0 8px rgba(255, 70, 70, 0.75));
      animation: pulseHeart 1.8s infinite ease-in-out;
    }

    @keyframes pulseHeart {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.12); }
    }

    /* HERO */
    .hero {
      text-align: center;
      margin-bottom: 34px;
    }

    .hero h1 {
      font-size: clamp(36px, 7vw, 86px);
      line-height: 1.08;
      font-weight: 900;
      color: var(--red-bright);
      text-shadow:
        0 0 18px rgba(255, 45, 45, 0.8),
        0 0 38px rgba(255, 20, 20, 0.45);
      margin-bottom: 18px;
    }

    .hero p {
      font-size: clamp(16px, 2.1vw, 28px);
      color: var(--text-sub);
      font-style: italic;
      max-width: 980px;
      margin: 0 auto;
      text-shadow: 0 0 10px rgba(255, 40, 40, 0.28);
    }

    /* CONTROLS */
    .controls {
      display: flex;
      justify-content: center;
      margin-top: 38px;
      margin-bottom: 28px;
    }

    .btn-main {
      border: none;
      cursor: pointer;
      padding: 18px 44px;
      border-radius: 999px;
      font-weight: 800;
      letter-spacing: 0.9px;
      font-size: clamp(17px, 2vw, 24px);
      color: #fff;
      background: linear-gradient(135deg, #cf002e, #ff2d2d);
      box-shadow:
        0 0 18px rgba(255, 45, 45, 0.85),
        0 12px 30px rgba(0, 0, 0, 0.45);
      transition: transform .18s ease, box-shadow .25s ease, filter .2s;
      text-transform: uppercase;
    }

    .btn-main:hover {
      transform: translateY(-2px) scale(1.03);
      box-shadow:
        0 0 26px rgba(255, 50, 50, 1),
        0 14px 35px rgba(0, 0, 0, 0.55);
      filter: brightness(1.05);
    }

    .btn-main:active {
      transform: scale(0.985);
    }

    /* MESSAGE SCREEN (substitui chat) */
    .screen-wrap {
      display: flex;
      justify-content: center;
    }

    .message-screen {
      width: min(100%, 980px);
      min-height: 180px;
      border-radius: 22px;
      padding: 28px 26px;
      background: linear-gradient(145deg, rgba(70,0,20,0.62), rgba(40,0,14,0.62));
      border: 2px solid var(--card-border);
      box-shadow:
        inset 0 0 28px rgba(255, 35, 35, 0.14),
        0 12px 38px rgba(0, 0, 0, 0.5),
        0 0 24px rgba(255, 40, 40, 0.25);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(8px);
      position: relative;
      overflow: hidden;
    }

    .message-screen::before {
      content: "";
      position: absolute;
      top: -140%;
      left: -60%;
      width: 55%;
      height: 350%;
      background: linear-gradient(120deg, transparent, rgba(255,80,80,.2), transparent);
      transform: rotate(20deg);
      animation: shine 5s linear infinite;
      pointer-events: none;
    }

    @keyframes shine {
      from { transform: translateX(-120%) rotate(20deg); }
      to { transform: translateX(380%) rotate(20deg); }
    }

    .screen-label {
      font-size: 13px;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--white-soft);
      opacity: .78;
      margin-bottom: 10px;
    }

    .screen-message {
      font-size: clamp(22px, 3.2vw, 36px);
      text-align: center;
      line-height: 1.45;
      font-weight: 700;
      color: var(--red-bright);
      text-shadow:
        0 0 10px rgba(255, 45, 45, 0.58),
        0 0 24px rgba(255, 30, 30, 0.32);
      padding: 4px 8px;
      animation: msgIn .35s ease;
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px) scale(.985); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* FOOTER / WATERMARK */
    .footer {
      margin-top: 44px;
      border-top: 1px solid rgba(255, 45, 45, 0.28);
      padding-top: 18px;
      text-align: center;
      color: var(--red-soft);
      font-size: clamp(14px, 1.7vw, 18px);
      text-shadow: 0 0 8px rgba(255, 40, 40, 0.25);
      opacity: 0.9;
    }

    /* HEART RAIN */
    .hearts-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .heart {
      position: absolute;
      top: -10vh;
      font-size: 30px;
      will-change: transform, opacity;
      animation: fall linear forwards;
      filter: drop-shadow(0 0 8px rgba(255, 55, 55, 0.75));
      opacity: 0.96;
    }

    @keyframes fall {
      to {
        transform: translateY(115vh) rotate(360deg);
        opacity: 0;
      }
    }

    @media (max-width: 700px) {
      .header {
        margin-bottom: 30px;
      }

      .message-screen {
        min-height: 150px;
        padding: 20px 15px;
      }

      .footer {
        margin-top: 30px;
      }
    }
  </style>
</head>
<body>
  <div class="hearts-layer" id="heartsLayer"></div>

  <div class="wrapper">
    <!-- HEADER sem menu -->
    <header class="header">
      <div class="brand">
        <span class="emoji">💕</span>
        <span>só para você ❤️</span>
      </div>
    </header>

    <!-- ASTRO PRINCIPAL -->
    <section class="hero">
      <h1>cada clique é algo diferente...</h1>
      <p>você é muito mais do que pensa, e transmite muito mais do que acha, definitivamente uma mulherzinha incrível :) ui ui ui </p>

      <div class="controls">
        <button id="btnClique" class="btn-main">Clique-me 💕</button>
      </div>

      <!-- telinha de mensagens -->
      <div class="screen-wrap">
        <div class="message-screen" aria-live="polite">
          <div class="screen-label">mensagens passando</div>
          <div class="screen-message" id="screenMessage">Você é simplesmente incrível ❤️</div>
        </div>
      </div>
    </section>

    <footer class="footer">algo simples mas belo</footer>
  </div>

  <script>
    const messages = [
      "Você é simplesmente incrível ❤️",
      "Seu brilho é raro, de verdade ✨",
      "Tem algo em você que acalma e encanta",
      "Você é mais especial do que imagina 💫",
      "Seu jeito é bonito por dentro e por fora",
      "Você transmite uma energia muito boa 🌹",
      "Você merece tudo o que é lindo 💖",
      "Sua presença faz diferença sim",
      "Você é uma mulherzinha incrível :)",
      "Continua sendo essa pessoa maravilhosa 💕"
    ];

    let messageIndex = 0;
    const screenMessage = document.getElementById("screenMessage");
    const btnClique = document.getElementById("btnClique");
    const heartsLayer = document.getElementById("heartsLayer");

    function nextMessage() {
      messageIndex = (messageIndex + 1) % messages.length;
      screenMessage.style.animation = "none";
      void screenMessage.offsetWidth; // restart animation
      screenMessage.textContent = messages[messageIndex];
      screenMessage.style.animation = "msgIn .35s ease";
    }

    function rainHearts(count = 60) {
      const hearts = ["❤️", "💖", "💕", "💘", "💗"];
      for (let i = 0; i < count; i++) {
        setTimeout(() => {
          const h = document.createElement("span");
          h.className = "heart";
          h.textContent = hearts[Math.floor(Math.random() * hearts.length)];
          h.style.left = Math.random() * 100 + "vw";
          h.style.fontSize = (18 + Math.random() * 28) + "px";
          h.style.animationDuration = (2.5 + Math.random() * 2.5) + "s";
          heartsLayer.appendChild(h);

          setTimeout(() => h.remove(), 5500);
        }, i * 38);
      }
    }

    // clique muda mensagem e faz chuva
    btnClique.addEventListener("click", () => {
      nextMessage();
      rainHearts(70);

      if (navigator.vibrate) {
        navigator.vibrate([18, 25, 18]);
      }
    });

    // telinha passando automaticamente
    setInterval(() => {
      nextMessage();
    }, 4500);
  </script>
</body>
</html>
