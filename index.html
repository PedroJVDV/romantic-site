<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>só para você ❤️</title>
  <style>
    :root {
      --bg1: #1a0008;
      --bg2: #2a0010;
      --bg3: #360014;
      --red-main: #ff4545;
      --red-soft: #ff6f6f;
      --card-bg: rgba(55, 0, 18, 0.6);
      --card-border: rgba(255, 60, 60, 0.5);
      --text-soft: #ffdada;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 20% 20%, #450018 0%, transparent 35%),
        radial-gradient(circle at 80% 80%, #3a0012 0%, transparent 35%),
        linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3));
      color: var(--red-main);
    }

    body {
      display: flex;
      justify-content: center;
      padding: 28px 16px 26px;
      position: relative;
    }

    .wrapper {
      width: 100%;
      max-width: 1200px;
      position: relative;
      z-index: 2;
    }

    .header {
      display: flex;
      align-items: center;
      border-bottom: 1px solid rgba(255, 70, 70, 0.28);
      padding-bottom: 16px;
      margin-bottom: 40px;
    }

    .brand {
      font-size: clamp(24px, 3vw, 40px);
      font-weight: 800;
      color: var(--red-main);
      letter-spacing: 0.4px;
      text-shadow: 0 0 4px rgba(255, 70, 70, 0.25); /* brilho fraco */
    }

    .hero {
      text-align: center;
      margin-bottom: 22px;
    }

    .hero h1 {
      font-size: clamp(34px, 7vw, 82px);
      line-height: 1.1;
      font-weight: 900;
      color: var(--red-main);
      margin-bottom: 16px;
      text-shadow: 0 0 5px rgba(255, 70, 70, 0.26); /* brilho fraco */
    }

    .hero p {
      font-size: clamp(16px, 2.05vw, 27px);
      color: var(--red-soft);
      font-style: italic;
      max-width: 980px;
      margin: 0 auto;
      text-shadow: 0 0 3px rgba(255, 70, 70, 0.15); /* brilho fraco */
    }

    .controls {
      display: flex;
      justify-content: center;
      margin-top: 34px;
      margin-bottom: 22px;
    }

    .btn-main {
      border: none;
      cursor: pointer;
      padding: 16px 42px;
      border-radius: 999px;
      font-weight: 800;
      letter-spacing: .7px;
      font-size: clamp(17px, 2vw, 23px);
      color: #fff;
      background: linear-gradient(135deg, #cb0030, #ff3030);
      box-shadow:
        0 0 10px rgba(255, 65, 65, 0.42),
        0 10px 24px rgba(0,0,0,.45);
      transition: transform .18s ease, box-shadow .25s ease;
      text-transform: uppercase;
    }

    .btn-main:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow:
        0 0 13px rgba(255, 70, 70, 0.5),
        0 12px 28px rgba(0,0,0,.55);
    }

    .screen-wrap {
      display: flex;
      justify-content: center;
    }

    .message-screen {
      width: min(100%, 980px);
      min-height: 170px;
      border-radius: 20px;
      padding: 24px 20px;
      background: linear-gradient(145deg, rgba(64,0,20,.62), rgba(38,0,14,.62));
      border: 2px solid var(--card-border);
      box-shadow:
        inset 0 0 18px rgba(255, 60, 60, 0.08),
        0 10px 30px rgba(0,0,0,.5);
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(7px);
    }

    .screen-message {
      font-size: clamp(20px, 3vw, 34px);
      text-align: center;
      line-height: 1.5;
      font-weight: 700;
      color: var(--red-main);
      text-shadow: 0 0 3px rgba(255, 70, 70, 0.2); /* brilho fraco */
      animation: msgIn .35s ease;
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px) scale(.985); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .footer {
      margin-top: 40px;
      border-top: 1px solid rgba(255, 70, 70, 0.2);
      padding-top: 16px;
      text-align: center;
      color: var(--red-soft);
      font-size: clamp(14px, 1.7vw, 18px);
      text-shadow: 0 0 2px rgba(255, 70, 70, 0.15);
      opacity: .92;
    }

    /* popup poesia em outro canto */
    .poetry-popup {
      position: fixed;
      right: 20px;
      top: 95px;
      width: min(320px, 88vw);
      min-height: 178px;
      background: rgba(22, 0, 9, 0.92);
      border: 1px solid rgba(255, 70, 70, 0.42);
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,.45);
      padding: 12px 13px 10px;
      z-index: 6;
      backdrop-filter: blur(8px);
    }

    .poetry-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255, 70, 70, 0.2);
      padding-bottom: 6px;
      margin-bottom: 8px;
      font-size: 12.5px;
      color: var(--text-soft);
    }

    .poetry-title {
      color: var(--red-soft);
      font-weight: 700;
      text-shadow: 0 0 2px rgba(255, 70, 70, 0.2);
    }

    .poetry-body {
      color: #ffd8d8;
      font-size: 14px;
      line-height: 1.55;
      min-height: 95px;
      display: flex;
      align-items: center;
      white-space: pre-line;
    }

    .poetry-author {
      margin-top: 8px;
      text-align: right;
      color: #ffaaaa;
      font-size: 12px;
      opacity: .93;
    }

    .hearts-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .heart {
      position: absolute;
      top: -10vh;
      font-size: 28px;
      animation: fall linear forwards;
      filter: drop-shadow(0 0 5px rgba(255, 75, 75, 0.38));
      opacity: .95;
    }

    @keyframes fall {
      to {
        transform: translateY(115vh) rotate(360deg);
        opacity: 0;
      }
    }

    @media (max-width: 860px) {
      .poetry-popup {
        position: static;
        margin: 14px auto 0;
      }
    }

    @media (max-width: 700px) {
      .header { margin-bottom: 26px; }
      .message-screen { min-height: 145px; padding: 18px 12px; }
      .footer { margin-top: 28px; }
    }
  </style>
</head>
<body>
  <div class="hearts-layer" id="heartsLayer"></div>

  <!-- quadrado novo em outro canto -->
  <aside class="poetry-popup" id="poetryPopup">
    <div class="poetry-head">
      <span class="poetry-title">poesia romântica</span>
      <span>1 min</span>
    </div>
    <div class="poetry-body" id="poetryText"></div>
    <div class="poetry-author" id="poetryAuthor"></div>
  </aside>

  <div class="wrapper">
    <header class="header">
      <div class="brand">só para você ❤️</div>
    </header>

    <section class="hero">
      <h1>cada clique é algo diferente...</h1>
      <p>você é muito mais do que pensa, e transmite muito mais do que acha, definitivamente uma mulherzinha incrível :) ui ui ui</p>

      <div class="controls">
        <button id="btnClique" class="btn-main">clique-me</button>
      </div>

      <div class="screen-wrap">
        <div class="message-screen" aria-live="polite">
          <!-- sem título -->
          <div class="screen-message" id="screenMessage">você é mais especial do que imagina</div>
        </div>
      </div>
    </section>

    <footer class="footer">algo simples mas belo</footer>
  </div>

  <script>
    // mensagens sem emoji, no estilo solicitado
    const messages = [
      "você é muito mais do que pensa",
      "você transmite muito mais do que acha",
      "definitivamente uma mulherzinha incrível",
      "seu jeito tem uma força tranquila",
      "você marca presença sem precisar forçar nada",
      "tem uma beleza no seu jeito de existir",
      "você é daquelas pessoas que ficam na memória",
      "você carrega luz mesmo quando não percebe",
      "seu olhar diz muito mais do que palavras",
      "você é simples e ainda assim inesquecível",
      "há delicadeza e firmeza em você ao mesmo tempo",
      "você tem um encanto próprio e muito raro"
    ];

    // trechos curtos inspirados em artistas românticos relevantes
    const poetry = [
      { text: "Amar é encontrar no outro um abrigo para aquilo que em nós ainda floresce.", author: "inspiração em Vinicius de Moraes" },
      { text: "O amor verdadeiro transforma o comum em extraordinário sem fazer barulho.", author: "inspiração em Pablo Neruda" },
      { text: "Quem ama aprende a enxergar beleza onde o mundo só via pressa.", author: "inspiração em Florbela Espanca" },
      { text: "No amor, o essencial é permanência, presença e delicadeza.", author: "inspiração em Clarice Lispector" },
      { text: "O coração reconhece antes aquilo que a razão demora para aceitar.", author: "inspiração em Fernando Pessoa" },
      { text: "Amar também é cuidar do silêncio do outro com ternura.", author: "inspiração em Cecília Meireles" }
    ];

    let messageIndex = 0;
    let poetryIndex = 0;

    const screenMessage = document.getElementById("screenMessage");
    const btnClique = document.getElementById("btnClique");
    const heartsLayer = document.getElementById("heartsLayer");
    const poetryText = document.getElementById("poetryText");
    const poetryAuthor = document.getElementById("poetryAuthor");

    function nextMessage() {
      messageIndex = (messageIndex + 1) % messages.length;
      screenMessage.style.animation = "none";
      void screenMessage.offsetWidth;
      screenMessage.textContent = messages[messageIndex];
      screenMessage.style.animation = "msgIn .35s ease";
    }

    function nextPoetry() {
      poetryIndex = (poetryIndex + 1) % poetry.length;
      poetryText.textContent = poetry[poetryIndex].text;
      poetryAuthor.textContent = poetry[poetryIndex].author;
    }

    function rainHearts(count = 56) {
      const hearts = ["❤", "♥", "♡"];
      for (let i = 0; i < count; i++) {
        setTimeout(() => {
          const h = document.createElement("span");
          h.className = "heart";
          h.textContent = hearts[Math.floor(Math.random() * hearts.length)];
          h.style.left = Math.random() * 100 + "vw";
          h.style.fontSize = (18 + Math.random() * 22) + "px";
          h.style.animationDuration = (2.6 + Math.random() * 2.1) + "s";
          heartsLayer.appendChild(h);
          setTimeout(() => h.remove(), 5200);
        }, i * 35);
      }
    }

    btnClique.addEventListener("click", () => {
      nextMessage();
      rainHearts(58);
      if (navigator.vibrate) navigator.vibrate([15, 22, 15]);
    });

    // tela passando mensagens
    setInterval(nextMessage, 4200);

    // popup poesia 1 em 1 minuto
    setInterval(nextPoetry, 60000);

    // inicial
    poetryText.textContent = poetry[0].text;
    poetryAuthor.textContent = poetry[0].author;
  </script>
</body>
</html>
